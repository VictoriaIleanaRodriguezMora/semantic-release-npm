name: Deploy and Release

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18' # Actualiza a Node.js 18 para compatibilidad

      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci # Usa npm ci para una instalación limpia

      - name: Lint
        run: npm run lint

      - name: Build storybook
        run: npm run build:storybook

      - name: Upload to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          ACCESS_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          BRANCH: storybook
          FOLDER: .storybook-out

      - name: Build sass and typescript
        run: |
          npm run build:typescript
          npm run build:sass

      - name: Release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ secrets.TOKEN_GITHUB }} # Usa GH_TOKEN en lugar de TOKEN_GITHUB
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
