name: Deploy storybook

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3  # Verifica si esta versión está permitida en tu repositorio
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3  # Verifica si esta versión está permitida en tu repositorio
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build storybook
        run: npm run build:storybook

      - name: Upload to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: jamesives/github-pages-deploy-action@v4
        with:
          ACCESS_TOKEN: ${{ secrets.TOKEN_GITHUB }}
          BRANCH: storybook
          FOLDER: .storybook-out

      - name: Build sass and typescript
        run: |
          npm run build:typescript
          npm run build:sass

      - name: Release
        run: npx semantic-release
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
